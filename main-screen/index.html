<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, initial-scale=1.0, user-scalable=no">
  <title>Tvorra — Main Screen</title>
  <style>
    /* ─── Design Tokens ─── */
    :root {
      --bg:         #08080f;
      --surface:    #13131e;
      --surface2:   #1c1c2e;
      --accent:     #C94BE0;
      --accent2:    #7040D8;
      --text:       #ffffff;
      --text2:      rgba(255,255,255,0.55);
      --text3:      rgba(255,255,255,0.30);
      --border:     rgba(255,255,255,0.07);
      --tab-h:      82px;
      --pro-h:      58px;
      --r-sm:       10px;
      --r-md:       16px;
      --r-lg:       22px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
      color: var(--text);
      width: 393px;
      height: 852px;
      margin: 0 auto;
      overflow: hidden;
      position: relative;
    }

    /* ─── Screen system ─── */
    .screen {
      position: absolute;
      inset: 0;
      width: 393px;
      height: 852px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateX(24px);
      transition: opacity 0.28s cubic-bezier(.4,0,.2,1),
                  transform 0.28s cubic-bezier(.4,0,.2,1);
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
      transform: translateX(0);
    }
    .screen.exit {
      opacity: 0;
      transform: translateX(-24px);
    }

    /* ════════════════════════════════
       FEED SCREEN
    ════════════════════════════════ */
    #s-feed { background: var(--bg); }

    .feed-scroll {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: calc(var(--tab-h) + var(--pro-h) + 16px);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .feed-scroll::-webkit-scrollbar { display: none; }

    /* Status bar */
    .status-bar {
      height: 54px;
      display: flex;
      align-items: flex-end;
      padding: 0 24px 10px;
      justify-content: space-between;
    }
    .status-time {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .status-icons { display: flex; gap: 5px; align-items: center; }

    /* Header */
    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 20px 18px;
    }
    .feed-logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.6px;
    }
    .feed-coins {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border-radius: 20px;
      padding: 6px 12px 6px 8px;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid var(--border);
    }
    .coin-dot {
      width: 20px; height: 20px;
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    /* ── Promoted Features ── */
    .promoted-scroll {
      display: flex;
      gap: 10px;
      padding: 0 20px 22px;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .promoted-scroll::-webkit-scrollbar { display: none; }

    .promoted-card {
      flex-shrink: 0;
      width: 106px;
      height: 106px;
      border-radius: var(--r-md);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: var(--surface2);
    }
    .promoted-card-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      animation: ken-burns 9s ease-in-out infinite alternate;
    }
    @keyframes ken-burns {
      from { transform: scale(1); }
      to   { transform: scale(1.10); }
    }
    .promoted-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        rgba(0,0,0,0.12) 0%,
        rgba(0,0,0,0.62) 100%
      );
    }
    .promoted-card-play {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px; height: 20px;
      background: rgba(255,255,255,0.22);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }
    .promoted-card-play svg {
      width: 8px; height: 8px;
      fill: #fff;
      margin-left: 1px;
    }
    .promoted-card-label {
      position: absolute;
      bottom: 9px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11.5px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.1px;
      line-height: 1;
    }

    /* ── Tags ── */
    .tags-scroll {
      display: flex;
      gap: 8px;
      padding: 0 20px 22px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tags-scroll::-webkit-scrollbar { display: none; }

    .tag {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 9px 15px;
      border-radius: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .tag.active {
      background: rgba(201, 75, 224, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .tag-icon { font-size: 14px; line-height: 1; }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 14px;
    }
    .section-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .section-see-all {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
    }

    /* ── Template cards grid ── */
    .templates-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 16px;
    }

    .tpl-card {
      border-radius: var(--r-md);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: var(--surface2);
      aspect-ratio: 9/16;
      transition: transform 0.15s;
    }
    .tpl-card:active { transform: scale(0.97); }

    .tpl-card-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: top center;
    }
    .tpl-card-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 40%,
        rgba(8,8,15,0.88) 100%
      );
    }
    .tpl-card-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 10px 11px;
    }
    .tpl-card-name {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.2px;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .tpl-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tpl-card-gens {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
    }
    .tpl-card-gens svg {
      width: 10px; height: 10px;
      fill: rgba(255,255,255,0.4);
    }
    .tpl-card-music {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
    }
    .tpl-card-music svg {
      width: 11px; height: 11px;
      stroke: rgba(255,255,255,0.7);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Pro badge (sticky above tab bar) ── */
    .pro-badge {
      position: absolute;
      bottom: var(--tab-h);
      left: 16px;
      right: 16px;
      height: var(--pro-h);
      background: linear-gradient(110deg, var(--accent2) 0%, var(--accent) 100%);
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      cursor: pointer;
      z-index: 50;
      box-shadow: 0 6px 28px rgba(201,75,224,0.4);
    }
    .pro-badge-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pro-badge-crown {
      font-size: 20px;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3));
    }
    .pro-badge-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .pro-badge-sub {
      font-size: 11.5px;
      color: rgba(255,255,255,0.72);
      font-weight: 500;
      margin-top: 1px;
    }
    .pro-badge-arrow {
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .pro-badge-arrow svg {
      width: 14px; height: 14px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Tab bar ── */
    .tab-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: var(--tab-h);
      background: rgba(8,8,15,0.94);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      padding-top: 12px;
      z-index: 49;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .tab-icon {
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab-icon svg {
      width: 23px; height: 23px;
      stroke: var(--text3);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.15s;
    }
    .tab-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      transition: color 0.15s;
    }
    .tab-item.active .tab-icon svg { stroke: var(--accent); }
    .tab-item.active .tab-label    { color: var(--accent); }


    /* ════════════════════════════════
       FULL SCREEN PREVIEW
    ════════════════════════════════ */
    #s-preview { background: #000; }

    .preview-photo {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: top center;
    }

    /* Top fade — title lives here */
    .preview-top-fade {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 220px;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.70) 0%,
        rgba(0,0,0,0.30) 50%,
        transparent 100%
      );
      z-index: 2;
    }

    /* Bottom fade */
    .preview-bottom-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 220px;
      background: linear-gradient(
        to top,
        rgba(8,8,15,0.95) 0%,
        rgba(8,8,15,0.40) 60%,
        transparent 100%
      );
      z-index: 2;
    }

    /* Top area: back + centered title */
    .preview-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding-top: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-back {
      position: absolute;
      left: 16px;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(0,0,0,0.42);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .preview-back svg {
      width: 16px; height: 16px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .preview-title {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      text-align: center;
      padding: 0 56px;
      line-height: 1.2;
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }

    /* Right social sidebar */
    .preview-sidebar {
      position: absolute;
      right: 14px;
      bottom: 150px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }
    .sidebar-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      transition: transform 0.12s;
    }
    .sidebar-btn:active { transform: scale(0.90); }
    .sidebar-icon-wrap {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(0,0,0,0.42);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .sidebar-icon-wrap.liked {
      background: rgba(255,77,109,0.25);
    }
    .sidebar-icon-wrap svg {
      width: 22px; height: 22px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.15s, fill 0.15s;
    }
    .sidebar-icon-wrap.liked svg {
      stroke: #ff4d6d;
      fill: #ff4d6d;
    }
    .sidebar-label {
      font-size: 11.5px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
    }

    /* Bottom CTA */
    .preview-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 20px 44px;
      z-index: 10;
    }
    .preview-cta {
      width: 100%;
      padding: 18px;
      background: linear-gradient(110deg, var(--accent2), var(--accent));
      border: none;
      border-radius: var(--r-md);
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      letter-spacing: -0.2px;
      box-shadow: 0 6px 24px rgba(201,75,224,0.45);
      transition: opacity 0.15s, transform 0.12s;
    }
    .preview-cta:active {
      opacity: 0.88;
      transform: scale(0.98);
    }
  </style>
</head>
<body>

<!-- ══════════ FEED ══════════ -->
<div class="screen active" id="s-feed">
  <div class="feed-scroll">

    <!-- Status bar -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <!-- Signal bars -->
        <svg width="17" height="12" viewBox="0 0 17 12" fill="white">
          <rect x="0"    y="7"   width="3" height="5"  rx="0.6"/>
          <rect x="4.5"  y="4.5" width="3" height="7.5" rx="0.6"/>
          <rect x="9"    y="2"   width="3" height="10" rx="0.6"/>
          <rect x="13.5" y="0"   width="3" height="12" rx="0.6"/>
        </svg>
        <!-- WiFi -->
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M8 10a1.5 1.5 0 1 1 0 3A1.5 1.5 0 0 1 8 10z" fill="white"/>
          <path d="M3.8 6.3C5.2 4.9 6.6 4.2 8 4.2s2.8.7 4.2 2.1" stroke="white" stroke-width="1.4" stroke-linecap="round"/>

        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">

          <rect x="2" y="2.5" width="16" height="7" rx="1" fill="white"/>

      </div>
    </div>

    <!-- Header -->
    <div class="feed-header">
      <span class="feed-logo">Tvorra</span>
      <div class="feed-coins">

    <!-- Promoted features -->
    <div class="promoted-scroll" id="promoted-scroll"></div>

    <!-- Tags -->
    <div class="tags-scroll" id="tags-scroll"></div>

    <!-- Templates -->
    <div class="section-header">
      <span class="section-title">Templates</span>
      <span class="section-see-all">See all</span>
    </div>
    <div class="templates-grid" id="templates-grid"></div>

    <div style="height:12px"></div>
  </div>

  <!-- Pro badge (above tab bar) -->
  <div class="pro-badge">
    <div class="pro-badge-left">
      <span class="pro-badge-crown">👑</span>
      <div>
        <div class="pro-badge-title">Unlock Tvorra Pro</div>
        <div class="pro-badge-sub">Unlimited generations &amp; effects</div>
      </div>
    </div>
    <div class="pro-badge-arrow">
      <svg viewBox="0 0 14 14"><polyline points="5,2 10,7 5,12"/></svg>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab-item active" onclick="setTab(this)">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <span class="tab-label">Explore</span>
    </div>
    <div class="tab-item" onclick="setTab(this)">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </div>
      <span class="tab-label">AI Studio</span>
    </div>
    <div class="tab-item" onclick="setTab(this)">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span class="tab-label">Profile</span>
    </div>
  </div>
</div>


<!-- ══════════ FULL SCREEN PREVIEW ══════════ -->
<div class="screen" id="s-preview">
  <div class="preview-photo" id="preview-photo"></div>
  <div class="preview-top-fade"></div>
  <div class="preview-bottom-fade"></div>

  <!-- Top: back + title -->
  <div class="preview-top">
    <button class="preview-back" onclick="nav('s-feed')">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="preview-title" id="preview-title">AI Kisses</div>
  </div>

  <!-- Right sidebar: Like / Share / Save -->
  <div class="preview-sidebar">
    <button class="sidebar-btn" onclick="toggleLike(this)">
      <div class="sidebar-icon-wrap" id="like-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06
                   a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78
                   1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <span class="sidebar-label" id="like-count">24.5K</span>
    </button>

    <button class="sidebar-btn">
      <div class="sidebar-icon-wrap">
        <svg viewBox="0 0 24 24">
          <circle cx="18" cy="5" r="3"/>
          <circle cx="6" cy="12" r="3"/>
          <circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </div>
      <span class="sidebar-label">Share</span>
    </button>

    <button class="sidebar-btn">
      <div class="sidebar-icon-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="sidebar-label">Save</span>
    </button>
  </div>

  <!-- CTA button -->
  <div class="preview-bottom">
    <button class="preview-cta">Use Template</button>
  </div>
</div>


<script>
  // ─── Data ───
  const PROMOTED = [
    { name: 'AI Kisses',  img: 'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=220&h=220&fit=crop&q=80' },
    { name: 'AI Hugs',    img: 'https://images.unsplash.com/photo-1516726817505-f5ed825624d8?w=220&h=220&fit=crop&q=80' },
    { name: 'AI Outfit',  img: 'https://images.unsplash.com/photo-1487222477894-8943e31ef7b2?w=220&h=220&fit=crop&q=80' },
    { name: 'AI Reels',   img: 'https://images.unsplash.com/photo-1509631179647-0177331693ae?w=220&h=220&fit=crop&q=80' },
    { name: 'AI Dances',  img: 'https://images.unsplash.com/photo-1535525153412-5a42439a210d?w=220&h=220&fit=crop&q=80' },

  // ─── Render: Promoted ───
  function renderPromoted() {
    document.getElementById('promoted-scroll').innerHTML = PROMOTED.map(p => `
      <div class="promoted-card">
        <div class="promoted-card-bg" style="background-image:url('${p.img}')"></div>
        <div class="promoted-card-overlay"></div>
        <div class="promoted-card-play">
          <svg viewBox="0 0 10 12"><polygon points="1,1 9,6 1,11" fill="white"/></svg>
        </div>
        <div class="promoted-card-label">${p.name}</div>
      </div>
    `).join('');
  }

  // ─── Render: Tags ───
  function renderTags() {
    document.getElementById('tags-scroll').innerHTML = TAGS.map(t => `
      <div class="tag${t.active ? ' active' : ''}" onclick="selectTag(this)">
        <span class="tag-icon">${t.icon}</span>
        <span>${t.label}</span>
      </div>
    `).join('');
  }

  function selectTag(el) {
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  // ─── Render: Templates ───
  function renderTemplates() {
    document.getElementById('templates-grid').innerHTML = TEMPLATES.map((t, i) => `
      <div class="tpl-card" onclick="openPreview(${i})">
        <div class="tpl-card-bg" style="background-image:url('${t.img}')"></div>
        <div class="tpl-card-gradient"></div>
        <div class="tpl-card-bottom">
          <div class="tpl-card-name">${t.name}</div>
          <div class="tpl-card-meta">
            <div class="tpl-card-gens">
              <svg viewBox="0 0 24 24">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
              </svg>
              ${t.gens} generated
            </div>
            ${t.hasMusic ? `
            <div class="tpl-card-music">
              <svg viewBox="0 0 24 24">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
              </svg>
            </div>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  // ─── Navigation ───
  function nav(targetId) {
    const screens = document.querySelectorAll('.screen');
    const current = document.querySelector('.screen.active');
    const target  = document.getElementById(targetId);

    if (current === target) return;

    current.classList.add('exit');
    current.classList.remove('active');
    target.classList.add('active');

    setTimeout(() => current.classList.remove('exit'), 320);
  }

  function openPreview(idx) {
    const t = TEMPLATES[idx];
    document.getElementById('preview-photo').style.backgroundImage = `url('${t.img}')`;
    document.getElementById('preview-title').textContent = t.name;
    document.getElementById('like-count').textContent = t.likes;
    // reset like
    document.getElementById('like-wrap').classList.remove('liked');
    nav('s-preview');
  }

  // ─── Like toggle ───
  function toggleLike(btn) {
    const wrap = document.getElementById('like-wrap');
    wrap.classList.toggle('liked');
  }

  // ─── Tab bar ───
  function setTab(el) {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  // ─── Init ───
  renderPromoted();
  renderTags();
  renderTemplates();
</script>
